<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEPS 단어 짝맞추기</title>
    <style>
        :root { --main-yellow: #FFD700; --bg-paper: #fdfdfd; --line-gray: #e0e0e0; --text-dark: #333; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #d1d1d1; display: flex; justify-content: center; margin: 0; padding: 20px; }
        
        /* 전체 컨테이너 (스마트폰 화면 느낌) */
        .phone-screen { background: #333; padding: 10px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        .app-container { background: var(--bg-paper); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; min-height: 650px; position: relative; }
        
        /* 상단 바 */
        .header { background: #2c3e50; color: var(--main-yellow); padding: 15px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        
        /* 문제 영역 */
        .quiz-body { flex: 1; padding: 20px; display: flex; justify-content: space-between; gap: 10px; background-image: linear-gradient(var(--line-gray) 1px, transparent 1px); background-size: 100% 40px; }
        .column { width: 48%; display: flex; flex-direction: column; gap: 12px; z-index: 1; }
        
        /* 카드 스타일 */
        .card { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 15px 5px; text-align: center; cursor: pointer; font-size: 0.9rem; transition: 0.2s; min-height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); word-break: keep-all; font-weight: 500; }
        .card:hover { transform: translateY(-2px); }
        
        /* 상태별 카드 색상 */
        .card.selected { background-color: var(--main-yellow); border-color: #d4af37; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
        .card.correct { background-color: #a2ffaf !important; border-color: #2ecc71 !important; color: #155724 !important; pointer-events: none; opacity: 0.8; }
        .card.correct::after { content: ' ✓'; margin-left: 5px; font-weight: bold; }
        .shake { animation: shake 0.3s; border-color: #e74c3c !important; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        
        /* 하단 버튼 */
        .footer { padding: 15px; background: #eee; text-align: center; }
        #next-btn { background: var(--main-yellow); border: none; padding: 12px 30px; font-weight: bold; border-radius: 50px; cursor: pointer; font-size: 1rem; box-shadow: 0 4px #b8860b; }
        #next-btn:active { transform: translateY(2px); box-shadow: 0 2px #b8860b; }
        .progress-text { font-size: 0.8rem; color: #777; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="phone-screen">
        <div class="app-container">
            <div class="header">짝맞추기 챌린지 (UNIT 01)</div>
            <div class="quiz-body">
                <div class="column" id="en-col"></div>
                <div class="column" id="ko-col"></div>
            </div>
            <div class="footer">
                <div class="progress-text" id="status-text">로딩 중...</div>
                <button id="next-btn" onclick="startNewSet()">다음 문제 (5개)</button>
            </div>
        </div>
    </div>

            {en: "certificate", ko: "증명서, 자격증"},
            {en: "bachelor's degree", ko: "학사 학위"},
            {en: "master's degree", ko: "석사 학위"},
            {en: "doctor's degree", ko: "박사 학위"},
            {en: "plagiarism", ko: "표절"},

            // # 쇼핑
            {en: "net price", ko: "정가"},
            {en: "sell by date", ko: "유통기한"},
            {en: "monthly installment", ko: "할부금"},
            {en: "retail store", ko: "소매점"},
            {en: "wholesale store", ko: "도매점"},

            {en: "complimentary", ko: "무료의"},
            {en: "voucher", ko: "상품권, 할인권"},
            {en: "refund, moneyback", ko: "환불"},
            {en: "guarantee", ko: "보장하다"},
            {en: "exorbitant", ko: "(가격이) 터무니없는"},
            {en: "reasonable", ko: "(가격이) 합리적인"},
            {en: "customize", ko: "맞춤 제작해 주다"},

            // # 교통
            {en: "traffic accident", ko: "교통사고"},
            {en: "hectic", ko: "정신없이 바쁜"},
            {en: "collision", ko: "충돌"},

            {en: "windshield", ko: "자동차 앞 유리"},
            {en: "traffic jam [congestion]", ko: "교통체증"},

            // # 질병
            {en: "infectious disease, epidemic", ko: "전염병"},
            {en: "immune to", ko: "~에 면역이 있는"},
            {en: "cure, treat", ko: "치료, 치료하다"},
            {en: "infection", ko: "감염"},
            {en: "symptom", ko: "증세"},
            {en: "chronic", ko: "만성의"},
            {en: "vicious (= malignant)", ko: "악성의"},
            {en: "prone", ko: "(부상 등을) 당하기 쉬운"},
            {en: "sore, painful", ko: "아픈"},
            {en: "public health authorities", ko: "공중 보건 당국"},
            {en: "be checked for the virus", ko: "바이러스 검사를 받다"},
            {en: "diagnose", ko: "진단하다"},
            {en: "test positive", ko: "양성반응을 보이다"},
            {en: "confirmed patient", ko: "확진 환자"},
            {en: "transmission", ko: "전염"},
            {en: "quarantine", ko: "격리(하다)"},
            {en: "trace the patient's steps", ko: "환자의 동선을 추적하다"},
            {en: "make a full recovery", ko: "완치되다"},
            {en: "be discharged from quarantine", ko: "격리 해제되다"}
        ];

        let selectedEnCard = null;
        let selectedKoCard = null;
        let wrongWords = []; // [추가] 틀린 단어를 저장할 배열

        function startNewSet() {
            const enCol = document.getElementById('en-col');
            const koCol = document.getElementById('ko-col');
            const status = document.getElementById('status-text');

            enCol.innerHTML = '';
            koCol.innerHTML = '';
            selectedEnCard = null;
            selectedKoCard = null;
        
            // [수정] 문제 추출 로직
            let currentBatch = [];

            // 1. 틀린 단어가 있다면 우선적으로 가져옴 (최대 7개)
            if (wrongWords.length > 0) {
                currentBatch = [...wrongWords].slice(0, 5);
                // 이미 가져온 단어는 오답 노트에서 일단 제거 (맞추면 영구 제거, 또 틀리면 다시 추가됨)
                wrongWords = wrongWords.slice(currentBatch.length);
            }
        
            // 2. 7개가 안 되면 나머지 부족한 만큼 전체 리스트에서 랜덤하게 채움
            const needed = 7 - currentBatch.length;
            if (needed > 0) {
                const remainingPool = fullWordList.filter(word => !currentBatch.includes(word));
                const extraWords = remainingPool.sort(() => 0.5 - Math.random()).slice(0, needed);
                currentBatch = [...currentBatch, ...extraWords];
            }
        
            status.innerText = `남은 오답: ${wrongWords.length}개 | 현재 7개 진행 중`;
        
            // 이하 카드 생성 로직은 동일
            const shuffledEn = [...currentBatch].sort(() => 0.5 - Math.random());
            const shuffledKo = [...currentBatch].sort(() => 0.5 - Math.random());
        
            shuffledEn.forEach(item => {
                const card = createCard(item.en, item.en, 'en', item); // 원본 객체 전달
                enCol.appendChild(card);
            });
        
            shuffledKo.forEach(item => {
                const card = createCard(item.ko, item.en, 'ko', item);
                koCol.appendChild(card);
            });
        }

        // [수정] createCard 함수에 item 인자 추가
        function createCard(text, matchValue, type, originalItem) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = text;
            card.dataset.value = matchValue;
            card.dataset.type = type;
            card.originalItem = originalItem; // [추가] 오답 저장을 위해 원본 객체 보관
        
            card.onclick = function() {
                if (card.classList.contains('correct')) return;
                const siblingCards = card.parentElement.querySelectorAll('.card');
                siblingCards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                if (type === 'en') selectedEnCard = card;
                else selectedKoCard = card;
                checkMatch();
            };
            return card;
        }

        function checkMatch() {
            if (selectedEnCard && selectedKoCard) {
                if (selectedEnCard.dataset.value === selectedKoCard.dataset.value) {
                    selectedEnCard.classList.replace('selected', 'correct');
                    selectedKoCard.classList.replace('selected', 'correct');
                    selectedEnCard = null;
                    selectedKoCard = null;
                } else {
                    // [수정] 오답 발생 시 틀린 단어 리스트에 추가
                    const failedWord = selectedEnCard.originalItem;
                    if (!wrongWords.some(w => w.en === failedWord.en)) {
                        wrongWords.push(failedWord);
                    }
                
                    const cardA = selectedEnCard;
                    const cardB = selectedKoCard;
                    cardA.classList.add('shake');
                    cardB.classList.add('shake');

                    setTimeout(() => {
                        cardA.classList.remove('selected', 'shake');
                        cardB.classList.remove('selected', 'shake');
                    }, 400);

                    selectedEnCard = null;
                    selectedKoCard = null;

                    // 상태 텍스트 업데이트
                    document.getElementById('status-text').innerText = `남은 오답: ${wrongWords.length}개 | 현재 진행 중`;
                }
            }
        }
        // 앱 시작
        window.onload = startNewSet;
    </script>
</body>
</html>
